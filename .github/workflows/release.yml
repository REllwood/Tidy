name: Release

# Push a version tag (e.g. v0.1.0) to build the macOS app and open a draft
# release with the .dmg attached. You review the draft, then hit Publish.
# You can also run it by hand from the Actions tab to test the build.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/name to use for a manual test build"
        default: "v0.0.0-test"
        required: false

permissions:
  contents: write # needed for the action to create the release

jobs:
  build-macos:
    # Apple Silicon runner. macOS 15 (not 14) because the screencapturekit crate
    # pulls in apple-metal, which needs the macOS 15 SDK to compile. The app's
    # own minimum stays 14.4 (deployment target), so it still runs on macOS 14.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Pick the newest Xcode on the image so we get a recent macOS SDK.
      - name: Select the latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Ensure CMake (whisper.cpp needs it)
        run: cmake --version || brew install cmake

      - name: Install front-end dependencies
        run: npm ci

      - name: Build the MCP sidecar
        run: ./scripts/build-sidecar.sh

      - name: Build the app and open a draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Tidy ${{ inputs.tag || github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            ### Tidy for macOS (Apple Silicon)

            Download `Tidy_*_aarch64.dmg` below, open it, and drag **Tidy** into your Applications folder.

            **First launch:** this build isn't signed with an Apple Developer certificate, so macOS will say it "cannot be checked for malicious software". That's expected. Right-click (or Control-click) the Tidy app, choose **Open**, then **Open** again. You only have to do this once.

            Runs on Apple Silicon Macs with macOS 14.4 or newer. [Ollama](https://ollama.com) is optional, for on-device meeting summaries.
